<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ZEXBEAT AI — BandLab Beat Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080a0f;
  --surface:#0d1117;
  --card:#111820;
  --border:#1e2d3d;
  --accent:#ff3c00;
  --accent2:#00e5ff;
  --accent3:#ffe600;
  --text:#e8edf3;
  --muted:#4a5568;
  --green:#00ff88;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Rajdhani',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* Noise texture overlay */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:0;
  opacity:.4;
}

/* Grid lines background */
.grid-bg{
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
  z-index:0;
}

.container{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 20px;}

/* HEADER */
header{
  padding:40px 0 20px;
  text-align:center;
  position:relative;
}
.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(48px,10vw,90px);
  letter-spacing:4px;
  line-height:1;
  background:linear-gradient(135deg, #ff3c00, #ff8800, #ffe600);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 30px rgba(255,60,0,.4));
  animation:flicker 4s ease-in-out infinite;
}
@keyframes flicker{
  0%,100%{filter:drop-shadow(0 0 30px rgba(255,60,0,.4));}
  50%{filter:drop-shadow(0 0 50px rgba(255,136,0,.7));}
}
.tagline{
  font-family:'Space Mono',monospace;
  font-size:11px;
  color:var(--accent2);
  letter-spacing:4px;
  text-transform:uppercase;
  margin-top:8px;
  opacity:.8;
}
.version-badge{
  display:inline-block;
  background:var(--accent);
  color:#fff;
  font-family:'Space Mono',monospace;
  font-size:9px;
  padding:2px 8px;
  letter-spacing:2px;
  margin-top:10px;
}

/* FORM CARD */
.form-card{
  background:var(--card);
  border:1px solid var(--border);
  border-top:2px solid var(--accent);
  padding:32px;
  margin:30px 0;
  position:relative;
}
.form-card::before{
  content:'BEAT CONFIG';
  position:absolute;
  top:-10px;
  left:20px;
  background:var(--accent);
  color:#fff;
  font-family:'Space Mono',monospace;
  font-size:9px;
  padding:2px 10px;
  letter-spacing:2px;
}

.field-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-bottom:20px;
}
@media(max-width:600px){.field-grid{grid-template-columns:1fr;}}

.field{display:flex;flex-direction:column;gap:8px;}
.field label{
  font-family:'Space Mono',monospace;
  font-size:10px;
  color:var(--accent2);
  letter-spacing:3px;
  text-transform:uppercase;
}
.field select, .field input, .field textarea{
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  padding:12px 14px;
  font-family:'Rajdhani',sans-serif;
  font-size:15px;
  font-weight:600;
  outline:none;
  transition:border-color .2s;
  -webkit-appearance:none;
}
.field select:focus, .field input:focus, .field textarea:focus{
  border-color:var(--accent2);
  box-shadow:0 0 0 2px rgba(0,229,255,.1);
}
.field select option{background:var(--card);}
.field textarea{resize:vertical;min-height:80px;}

.full-width{grid-column:1/-1;}

/* Mood chips */
.mood-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
.chip{
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--muted);
  font-family:'Space Mono',monospace;
  font-size:10px;
  padding:6px 12px;
  cursor:pointer;
  letter-spacing:1px;
  transition:all .15s;
  user-select:none;
}
.chip:hover{border-color:var(--accent2);color:var(--accent2);}
.chip.active{background:var(--accent2);border-color:var(--accent2);color:var(--bg);}

/* Generate button */
.btn-generate{
  width:100%;
  background:var(--accent);
  border:none;
  color:#fff;
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;
  letter-spacing:4px;
  padding:18px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:all .2s;
  margin-top:24px;
}
.btn-generate::before{
  content:'';
  position:absolute;
  top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
  transition:left .4s;
}
.btn-generate:hover::before{left:100%;}
.btn-generate:hover{background:#ff5500;transform:translateY(-1px);box-shadow:0 8px 25px rgba(255,60,0,.4);}
.btn-generate:active{transform:translateY(0);}
.btn-generate:disabled{background:var(--muted);cursor:not-allowed;transform:none;}

/* Loading state */
.loading-bar{
  display:none;
  height:3px;
  background:var(--border);
  margin-top:16px;
  overflow:hidden;
}
.loading-bar.active{display:block;}
.loading-bar-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));
  animation:loadbar 1.5s ease-in-out infinite;
  width:60%;
}
@keyframes loadbar{
  0%{transform:translateX(-100%);}
  100%{transform:translateX(250%);}
}

/* OUTPUT SECTION */
#output-section{display:none;}
#output-section.visible{display:block;animation:fadeUp .5s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.output-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  padding-bottom:16px;
  border-bottom:1px solid var(--border);
}
.output-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;
  letter-spacing:3px;
  color:var(--accent3);
}
.btn-copy{
  background:transparent;
  border:1px solid var(--accent2);
  color:var(--accent2);
  font-family:'Space Mono',monospace;
  font-size:10px;
  padding:8px 16px;
  cursor:pointer;
  letter-spacing:2px;
  transition:all .2s;
}
.btn-copy:hover{background:var(--accent2);color:var(--bg);}

/* Section blocks */
.beat-section{
  background:var(--surface);
  border:1px solid var(--border);
  border-left:3px solid var(--accent2);
  padding:20px 24px;
  margin-bottom:16px;
}
.beat-section.highlight{border-left-color:var(--accent);}
.beat-section.success{border-left-color:var(--green);}
.beat-section.warning{border-left-color:var(--accent3);}

.section-label{
  font-family:'Space Mono',monospace;
  font-size:9px;
  color:var(--accent2);
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  gap:8px;
}
.section-label::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--border);
}
.beat-section.highlight .section-label{color:var(--accent);}
.beat-section.success .section-label{color:var(--green);}
.beat-section.warning .section-label{color:var(--accent3);}

.beat-content{
  font-size:15px;
  line-height:1.7;
  color:var(--text);
  white-space:pre-wrap;
  font-weight:500;
}

/* Settings grid */
.settings-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:12px;
  margin-top:8px;
}
.setting-item{
  background:var(--card);
  border:1px solid var(--border);
  padding:12px 14px;
}
.setting-key{
  font-family:'Space Mono',monospace;
  font-size:9px;
  color:var(--muted);
  letter-spacing:2px;
  margin-bottom:4px;
}
.setting-val{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;
  letter-spacing:1px;
  color:var(--accent3);
}
.setting-unit{
  font-family:'Space Mono',monospace;
  font-size:9px;
  color:var(--muted);
}

/* Step list */
.step-list{counter-reset:steps;list-style:none;margin-top:8px;}
.step-list li{
  counter-increment:steps;
  display:flex;
  gap:14px;
  align-items:flex-start;
  padding:10px 0;
  border-bottom:1px solid rgba(30,45,61,.5);
  font-size:15px;
  line-height:1.5;
}
.step-list li:last-child{border-bottom:none;}
.step-list li::before{
  content:counter(steps);
  background:var(--accent);
  color:#fff;
  font-family:'Space Mono',monospace;
  font-size:10px;
  width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  margin-top:2px;
}

/* Volume per section table */
.vol-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:13px;}
.vol-table th{background:var(--bg);color:var(--accent2);font-family:"Space Mono",monospace;font-size:9px;letter-spacing:2px;padding:8px 10px;text-align:center;border:1px solid var(--border);}
.vol-table th:first-child{text-align:left;}
.vol-table td{padding:8px 10px;border:1px solid var(--border);text-align:center;font-family:"Space Mono",monospace;font-size:11px;color:var(--text);}
.vol-table td:first-child{text-align:left;color:var(--accent3);font-weight:700;font-size:12px;white-space:nowrap;}
.vol-table tr:nth-child(even) td{background:rgba(0,229,255,.02);}
.vol-table td.mute{color:var(--muted);font-style:italic;}
.vol-table td.hook-val{color:var(--green);font-weight:700;}
.vol-note{font-family:"Rajdhani",sans-serif;font-size:12px;color:var(--muted);font-style:italic;text-align:left !important;max-width:160px;}
.vol-scroll{overflow-x:auto;margin-top:8px;}

/* Footer */
footer{
  text-align:center;
  padding:40px 0;
  font-family:'Space Mono',monospace;
  font-size:10px;
  color:var(--muted);
  letter-spacing:2px;
}
.waveform{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:3px;
  margin-bottom:12px;
}
.wave-bar{
  width:3px;
  background:var(--accent);
  border-radius:1px;
  animation:wave var(--d,0.8s) ease-in-out infinite alternate;
  opacity:.6;
}
@keyframes wave{from{height:4px;}to{height:var(--h,20px);}}
</style>
</head>
<body>
<div class="grid-bg"></div>

<div class="container">
  <header>
    <div class="logo">ZEXBEAT AI</div>
    <div class="tagline">Professional Beat Generator — Powered by AI × BandLab Android</div>
    <div class="version-badge">v1.0 — ALL GENRES</div>
  </header>

  <!-- FORM -->
  <div class="form-card">
    <div class="field-grid">
      <div class="field">
        <label>Genre</label>
        <select id="genre">
          <option value="">— Pilih Genre —</option>
          <optgroup label="Hip-Hop / Urban">
            <option>Trap</option>
            <option>Drill (Chicago)</option>
            <option>UK Drill</option>
            <option>Boom Bap</option>
            <option>Lo-Fi Hip Hop</option>
            <option>Phonk</option>
            <option>Cloud Rap</option>
          </optgroup>
          <optgroup label="Afro / World">
            <option>Afrobeats</option>
            <option>Amapiano</option>
            <option>Afro Drill</option>
            <option>Dancehall</option>
            <option>Reggaeton</option>
          </optgroup>
          <optgroup label="R&B / Soul">
            <option>R&B</option>
            <option>Neo Soul</option>
            <option>Alternative R&B</option>
          </optgroup>
          <optgroup label="Electronic">
            <option>House</option>
            <option>Deep House</option>
            <option>Future Bass</option>
            <option>EDM / Big Room</option>
            <option>Dubstep</option>
            <option>Jersey Club</option>
          </optgroup>
          <optgroup label="Pop / Commercial">
            <option>Pop</option>
            <option>Hyperpop</option>
            <option>K-Pop Style</option>
          </optgroup>
          <optgroup label="Lain">
            <option>Rock</option>
            <option>Metal</option>
            <option>Jazz Fusion</option>
            <option>Gospel</option>
            <option>Custom / Hybrid</option>
          </optgroup>
        </select>
      </div>

      <div class="field">
        <label>Subgenre / Referensi Artis</label>
        <input type="text" id="reference" placeholder="e.g. Metro Boomin, Don Toliver..."/>
      </div>

      <div class="field">
        <label>BPM Range</label>
        <select id="bpm">
          <option value="">— Auto (sesuai genre) —</option>
          <option>Slow (60–80 BPM)</option>
          <option>Mid Tempo (80–110 BPM)</option>
          <option>Standard (110–130 BPM)</option>
          <option>Fast (130–150 BPM)</option>
          <option>Very Fast (150+ BPM)</option>
        </select>
      </div>

      <div class="field">
        <label>Key / Scale</label>
        <select id="key">
          <option value="">— Auto —</option>
          <option>C Minor</option>
          <option>C# Minor</option>
          <option>D Minor</option>
          <option>D# Minor</option>
          <option>E Minor</option>
          <option>F Minor</option>
          <option>F# Minor</option>
          <option>G Minor</option>
          <option>A Minor</option>
          <option>B Minor</option>
          <option>C Major</option>
          <option>G Major</option>
          <option>A Major</option>
        </select>
      </div>

      <div class="field full-width">
        <label>Mood / Vibe</label>
        <div class="mood-chips" id="mood-chips">
          <span class="chip" data-val="Dark &amp; Aggressive">Dark &amp; Aggressive</span>
          <span class="chip" data-val="Melodic &amp; Emotional">Melodic &amp; Emotional</span>
          <span class="chip" data-val="Hard &amp; Bouncy">Hard &amp; Bouncy</span>
          <span class="chip" data-val="Chill &amp; Wavy">Chill &amp; Wavy</span>
          <span class="chip" data-val="Euphoric &amp; Energetic">Euphoric &amp; Energetic</span>
          <span class="chip" data-val="Cinematic &amp; Epic">Cinematic &amp; Epic</span>
          <span class="chip" data-val="Romantic &amp; Smooth">Romantic &amp; Smooth</span>
          <span class="chip" data-val="Raw &amp; Gritty">Raw &amp; Gritty</span>
        </div>
      </div>

      <div class="field full-width">
        <label>Deskripsi Tambahan (Opsional)</label>
        <textarea id="extra" placeholder="e.g. Mau vibes seperti lagu Night Owl FM, ada violin, buat rap Indonesia..."></textarea>
      </div>
    </div>

    <button class="btn-generate" id="btn-gen" onclick="generateBeat()">
      ⚡ GENERATE BEAT
    </button>
    <div class="loading-bar" id="loading-bar">
      <div class="loading-bar-fill"></div>
    </div>
  </div>

  <!-- OUTPUT -->
  <div id="output-section">
    <div class="output-header">
      <div class="output-title">BEAT RECIPE</div>
      <button class="btn-copy" onclick="copyAll()">⎘ COPY ALL</button>
    </div>
    <div id="output-content"></div>
  </div>

  <footer>
    <div class="waveform" id="waveform"></div>
    ZEXBEAT AI × BANDLAB ANDROID — MADE FOR ZEXINFO
  </footer>
</div>

<script>
// Waveform animation
const wf = document.getElementById('waveform');
for(let i=0;i<18;i++){
  const b=document.createElement('div');
  b.className='wave-bar';
  const h=Math.random()*20+4;
  b.style.cssText=`--h:${h}px;--d:${(Math.random()*0.5+0.4).toFixed(2)}s;height:${h}px;animation-delay:${(Math.random()*0.5).toFixed(2)}s`;
  wf.appendChild(b);
}

// Mood chip toggle
document.querySelectorAll('.chip').forEach(c=>{
  c.addEventListener('click',()=>c.classList.toggle('active'));
});

function getSelectedMoods(){
  return [...document.querySelectorAll('.chip.active')].map(c=>c.dataset.val).join(', ');
}

async function generateBeat(){
  const genre = document.getElementById('genre').value;
  if(!genre){alert('Pilih genre dulu!');return;}

  const btn = document.getElementById('btn-gen');
  const loading = document.getElementById('loading-bar');
  btn.disabled = true;
  btn.textContent = 'GENERATING...';
  loading.classList.add('active');
  document.getElementById('output-section').classList.remove('visible');

  const payload = {
    genre,
    reference: document.getElementById('reference').value,
    bpm: document.getElementById('bpm').value,
    key: document.getElementById('key').value,
    mood: getSelectedMoods(),
    extra: document.getElementById('extra').value
  };

  try {
    const res = await fetch('/api/generate', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    renderOutput(data);
  } catch(e){
    alert('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '⚡ GENERATE BEAT';
    loading.classList.remove('active');
  }
}

function renderOutput(d){
  const el = document.getElementById('output-content');

  // Build settings grid HTML
  const settingsHTML = d.settings.map(s=>`
    <div class="setting-item">
      <div class="setting-key">${s.label}</div>
      <div class="setting-val">${s.value}<span class="setting-unit"> ${s.unit||''}</span></div>
    </div>
  `).join('');

  // Build step list HTML
  const stepsHTML = d.steps.map(s=>`<li>${s}</li>`).join('');

  // Build instruments HTML
  const instrHTML = d.instruments.map(s=>`<li>${s}</li>`).join('');

  // Build volume per section table
  let volTableHTML = '';
  if(d.volume_per_section && d.volume_per_section.length){
    const rows = d.volume_per_section.map(v => {
      const hookClass = v.hook === 'mute' ? 'mute' : 'hook-val';
      const introClass = v.intro === 'mute' ? 'mute' : '';
      const verseClass = v.verse === 'mute' ? 'mute' : '';
      const prehookClass = v.prehook === 'mute' ? 'mute' : '';
      const outroClass = v.outro === 'mute' ? 'mute' : '';
      return `<tr>
        <td>${v.instrument}</td>
        <td class="${introClass}">${v.intro}</td>
        <td class="${verseClass}">${v.verse}</td>
        <td class="${prehookClass}">${v.prehook}</td>
        <td class="${hookClass}">${v.hook}</td>
        <td class="${outroClass}">${v.outro}</td>
        <td class="vol-note">${v.note||''}</td>
      </tr>`;
    }).join('');
    volTableHTML = `
      <div class="vol-scroll">
        <table class="vol-table">
          <thead><tr>
            <th>INSTRUMEN</th>
            <th>INTRO</th>
            <th>VERSE</th>
            <th>PRE-HOOK</th>
            <th>HOOK</th>
            <th>OUTRO</th>
            <th>CATATAN</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  el.innerHTML = `
    <div class="beat-section highlight">
      <div class="section-label">BEAT IDENTITY</div>
      <div class="beat-content">${d.identity}</div>
    </div>

    <div class="beat-section warning">
      <div class="section-label">BANDLAB SETTINGS — ANGKA SPESIFIK</div>
      <div class="settings-grid">${settingsHTML}</div>
    </div>

    <div class="beat-section">
      <div class="section-label">INSTRUMEN & SOUNDS</div>
      <ul class="step-list">${instrHTML}</ul>
    </div>

    <div class="beat-section success">
      <div class="section-label">VOLUME PER SECTION — dB TIAP BAGIAN</div>
      ${volTableHTML}
    </div>

    <div class="beat-section">
      <div class="section-label">STRUKTUR BEAT</div>
      <div class="beat-content">${d.structure}</div>
    </div>

    <div class="beat-section highlight">
      <div class="section-label">STEP-BY-STEP DI BANDLAB ANDROID</div>
      <ul class="step-list">${stepsHTML}</ul>
    </div>

    <div class="beat-section">
      <div class="section-label">MIXING & MASTERING TIPS</div>
      <div class="beat-content">${d.mixing}</div>
    </div>

    <div class="beat-section warning">
      <div class="section-label">PRO TIPS</div>
      <div class="beat-content">${d.protips}</div>
    </div>
  `;

  const out = document.getElementById('output-section');
  out.classList.add('visible');
  out.scrollIntoView({behavior:'smooth', block:'start'});
}

function copyAll(){
  const text = document.getElementById('output-content').innerText;
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.querySelector('.btn-copy');
    btn.textContent = '✓ COPIED!';
    setTimeout(()=>btn.textContent='⎘ COPY ALL', 2000);
  });
}
</script>
</body>
</html>
